apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: hsts-header
spec:
  headers:
    frameDeny: true
    customFrameOptionsValue: SAMEORIGIN
    contentTypeNosniff: true
    browserXssFilter: true
    forceSTSHeader: true
    sslRedirect: true
    stsPreload: true
    stsSeconds: 315360000
    stsIncludeSubdomains: true
    # contentSecurityPolicy: "block-all-mixed-content;"
